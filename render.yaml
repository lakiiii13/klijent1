services:
  - type: web
    name: la-vie-salon
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    disk:
      name: la-vie-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20.18.3
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: SALON_EMAIL
        sync: false
      - key: SALON_NAME
        value: La Vie Spray Tan Salon
      - key: ADMIN_PASSWORD
        sync: false
      - key: SITE_URL
        value: https://la-vie-salon.onrender.com
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
