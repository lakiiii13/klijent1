services:
  - type: web
    name: la-vie-salon
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.18.3
      - key: NODE_ENV
        value: production
      - key: SALON_EMAIL
        sync: false
      - key: SALON_NAME
        value: La Vie Spray Tan Salon
      - key: ADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SITE_URL
        sync: false
